name: Pytest

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -U pytest
      - name: Test with pytest
        env:
          GEMINI_MODEL: "fake-gemini-model"
          GEMINI_API_KEY: "fake-gemini-key-for-testing"
          RENIEC_API_URL: "https://fake-reniec-api.com"
          RENIEC_API_KEY: "fake-reniec-key-for-testing"
          INTERNAL_IA_KEY: "fake-internal-key-for-testing"
        run: PYTHONPATH=. python -m pytest -s
